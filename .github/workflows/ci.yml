name: TMAP QA Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests (no emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mock proxy tests
        run: |
          pytest mock_proxy/tests/ -m "mock_proxy" --alluredir=allure-results || exit_code=$?
          # exit code 5 = no tests collected → treat as success
          if [ "${exit_code:-0}" -eq 5 ]; then
            echo "테스트 수집 없음 — 스킵"
            exit 0
          fi
          exit ${exit_code:-0}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results/

  emulator-test:
    name: Emulator Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis_playstore
          arch: x86_64
          script: |
            adb wait-for-device
            adb emu geo fix 126.978 37.566
            echo "Emulator GPS injection smoke test passed"

      # NOTE: 전체 시나리오는 티맵 로그인 상태가 필요하므로 로컬에서 실행.
      # CI에서는 에뮬레이터 기동 + GPS 주입 스모크만 검증.
      # 전체 시나리오 결과는 Allure 리포트 아티팩트로 별도 업로드.

  allure-report:
    name: Publish Allure Report
    needs: [unit-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results/

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar xz -C /opt/
          echo "/opt/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
